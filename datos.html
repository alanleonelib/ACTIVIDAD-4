
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos Recibidos</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="formulario_container">
        <div class="formulario" style="gap: 1.5rem; text-align: center;">
            <h2 style="color: rgb(255, 211, 154); margin-bottom: 1rem;">Datos Recibidos</h2>
            
            <p style="color: rgb(105, 105, 105); font-size: 1.2rem;">
                <strong>Nombre:</strong> <span id="res-nombre"></span>
            </p>
            <p style="color: rgb(105, 105, 105); font-size: 1.2rem;">
                <strong>Email:</strong> <span id="res-email"></span>
            </p>
            <p style="color: rgb(105, 105, 105); font-size: 1.2rem;">
                <strong>Edad:</strong> <span id="res-edad"></span>
            </p>
            <p style="color: rgb(105, 105, 105); font-size: 1.2rem; text-transform: capitalize;">
                <strong>País:</strong> <span id="res-pais"></span>
            </p>

            <a href="index.html" style="text-decoration: none; margin-top: 1rem;">
                <button type="button" style="margin-left: 0;">Volver</button>
            </a>
        </div>
    </main>

    <script src="./script_datos.js"></script>
</body>
</html>
