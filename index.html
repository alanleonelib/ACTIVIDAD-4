<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 4</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="formulario_container">

        <form class="formulario" method="get" action="datos.html">
            
            <label for="nombre">Nombre: </label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresá tu nombre">
            <p class="nombre_incorrecto">*El nombre contiene menos de 5 caracteres</p>

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com">
            <p class="email_incorrecto">*Ingresa un email valido</p>
            

            <label for="edad">Edad: </label>
            <input type="number" id="edad" name="edad" placeholder="Edad entre 18 y 60">
            <p class="edad_incorrecta">*La edad debe ser entre 18 y 60</p>

            <label for="pais">País: </label>
            <select id="pais" name="pais">

                <option value="">Seleccione un país: </option>
                <option value="argentina">Argentina</option>
                <option value="chile">Chile</option>
                <option value="uruguay">Uruguay</option>

            </select>

            

            <div class="terminos_y_condiciones">

                <input type="checkbox" id="terminos" name="terminos">
                <label for="terminos">Acepto terminos y condiciones</label>

            </div>
           
            <div>

                <button type="submit">Enviar</button>

            </div>

            <p class="completar_vacio">*Debe completar todos los campos</p>
          


        </form>

    </main>
</body>
<script src="./script.js"></script>
</html>
